<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MuvMi Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #e5e5ea;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 32px 0 48px;
      -webkit-font-smoothing: antialiased;
    }

    .phone {
      width: 393px;
      height: 852px;
      border-radius: 48px;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0,0,0,0.22), 0 0 0 1px rgba(0,0,0,0.06);
      position: relative;
    }

    /* Home screen layer */
    .screen-img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      display: none;
    }
    .screen-img.active { display: block; }

    /* Transparent hotspot button */
    .hotspot {
      position: absolute;
      background: transparent;
      border: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      padding: 0;
    }

    /* ── Dynamic Side Menu ───────────────────────────────── */
    .side-menu {
      position: absolute; inset: 0;
      display: none; z-index: 10;
      font-family: 'Sarabun', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .side-menu.active { display: block; }

    /* Map peek — right strip */
    .side-menu-map-bg {
      position: absolute; inset: 0;
      background: #c9d1c5;
    }

    /* Main panel */
    .side-menu-panel {
      position: absolute; left: 0; top: 0;
      width: 338px; height: 100%;
      background: #fff;
      overflow-y: auto; overflow-x: hidden;
      display: flex; flex-direction: column;
    }

    /* ── Status bar (matches wallet-app) ── */
    .sm-statusbar {
      height: 44px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px 0 48px;
      font-size: 15px; font-weight: 600; color: #4f4f4f; letter-spacing: -0.165px;
    }

    /* ── Profile section ── */
    .sm-profile {
      display: flex; align-items: center; gap: 12px;
      padding: 8px 16px 16px;
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }
    .sm-avatar {
      width: 48px; height: 48px; border-radius: 50%;
      background: #0d57e2;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .sm-profile-info { display: flex; flex-direction: column; gap: 4px; }
    .sm-phone {
      font-size: 16px; font-weight: 600; color: #4f4f4f; letter-spacing: 0.25px;
    }
    .sm-gang-badge {
      display: inline-flex; align-items: center; gap: 4px;
      background: #0d57e2; border-radius: 99px;
      padding: 1px 10px; width: fit-content;
      font-size: 12px; font-weight: 600; color: #fff; letter-spacing: 0.25px;
    }
    .sm-gang-chevron { font-size: 10px; opacity: 0.8; }

    /* ── Cards area ── */
    .sm-cards { padding: 16px 16px 0; display: flex; flex-direction: column; gap: 12px; }

    /* Wallet card — mirrors .balance-card from wallet-app */
    .sm-wallet-card {
      border: 1px solid #e7eefc;
      border-radius: 16px; overflow: hidden;
    }
    .sm-wallet-top {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px 10px;
    }
    .sm-wallet-label {
      display: flex; align-items: center; gap: 8px;
      font-size: 16px; font-weight: 600; color: #0d57e2; letter-spacing: 0.25px;
    }
    .sm-wallet-icon { width: 16px; height: 16px; flex-shrink: 0; }
    .sm-wallet-balance {
      font-size: 20px; font-weight: 600; color: #4f4f4f; letter-spacing: 0.25px;
    }
    .sm-wallet-bottom {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px 14px;
      /* border-top: 1px solid #e7eefc; */
      margin-top: 8px; padding-top: 10px;
    }
    .sm-expiry-text {
      font-size: 12px; font-weight: 500; color: #909090; letter-spacing: 0.25px; line-height: 18px;
    }
    .sm-expiry-date { font-weight: 600; }
    .sm-expiry-date.red    { color: #f05555; }
    .sm-expiry-date.orange { color: #ea7d15; }
    .sm-expiry-date.gray   { color: #909090; }
    /* Enter button — mirrors .btn-primary */
    .sm-enter-btn {
      background: #0d57e2; color: #fff;
      border: none; border-radius: 24px;
      height: 36px; padding: 0 20px;
      font-family: 'Sarabun', sans-serif;
      font-size: 14px; font-weight: 600; letter-spacing: 0.25px;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: opacity 0.12s;
    }
    .sm-enter-btn:active { opacity: 0.82; }

    /* Travel Pass card — same border style */
    .sm-travel-card {
      border: 1px solid #e7eefc;
      border-radius: 16px; padding: 14px 16px;
    }
    .sm-travel-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 4px;
    }
    .sm-travel-label {
      display: flex; align-items: center; gap: 8px;
      font-size: 16px; font-weight: 600; color: #3f9688; letter-spacing: 0.25px;
    }
    .sm-travel-icon { width: 16px; height: 16px; flex-shrink: 0; }
    .sm-travel-desc {
      font-size: 12px; font-weight: 500; color: #909090;
      letter-spacing: 0.25px; line-height: 18px; margin-bottom: 12px;
    }
    .sm-explore-btn {
      width: 100%; height: 36px;
      background: #0d57e2; color: #fff;
      border: none; border-radius: 24px;
      font-family: 'Sarabun', sans-serif;
      font-size: 14px; font-weight: 600; letter-spacing: 0.25px;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: opacity 0.12s;
    }
    .sm-explore-btn:active { opacity: 0.82; }

    /* ── Menu list (matches .payment-list style) ── */
    .sm-menu {
      margin-top: 8px; padding: 0 0 80px;
      border-top: 1px solid rgba(0,0,0,0.08);
    }
    .sm-menu-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 15px 20px;
      border-bottom: 1px solid rgba(0,0,0,0.07);
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: background 0.1s;
    }
    .sm-menu-item:active { background: rgba(0,0,0,0.03); }
    .sm-menu-left {
      display: flex; align-items: center; gap: 14px;
    }
    .sm-menu-icon {
      width: 20px; height: 20px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      color: #909090;
    }
    .sm-menu-text {
      font-size: 14px; font-weight: 500; color: #4f4f4f; letter-spacing: 0.25px; line-height: 22px;
    }
    /* Badge — mirrors .default-chip style */
    .sm-badge {
      font-size: 10px; font-weight: 500; letter-spacing: 0.25px; line-height: 18px;
      padding: 0 8px; border-radius: 99px; white-space: nowrap;
    }
    .sm-badge.new { background: #e7eefc; color: #0d57e2; }
    .sm-badge.hot { background: #fde8e8; color: #f05555; }

    /* Home indicator */
    .sm-home-indicator {
      position: fixed; bottom: 14px; left: 0; width: 338px;
      display: flex; justify-content: center; pointer-events: none;
    }
    .sm-home-indicator-bar {
      width: 110px; height: 4px;
      background: #4f4f4f; border-radius: 2px; opacity: 0.18;
    }
  </style>
</head>

              <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                <rect x="2" y="6" width="16" height="8" rx="2" stroke="currentColor" stroke-width="1.4"/>
                <path d="M7 10h6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                <path d="M7 10a2 2 0 1 1-4 0 2 2 0 0 1 4 0Z" fill="currentColor"/>
                <path d="M13 10a2 2 0 1 0 4 0 2 2 0 0 0-4 0Z" fill="currentColor"/>
              </svg>
            </span>
            <span class="sm-menu-text">Voucher Code</span>
          </div>
        </div>
        <!-- Referral Bonus -->
        <div class="sm-menu-item">
          <div class="sm-menu-left">
            <span class="sm-menu-icon">
              <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                <path d="M10 2l2.1 4.3 4.7.7-3.4 3.3.8 4.7L10 12.5l-4.2 2.5.8-4.7L3.2 7l4.7-.7L10 2Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
              </svg>
            </span>
            <span class="sm-menu-text">Referral Bonus</span>
          </div>
          <span class="sm-badge hot">Hot</span>
        </div>
        <!-- Private Service -->
        <div class="sm-menu-item">
          <div class="sm-menu-left">
            <span class="sm-menu-icon">
              <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                <circle cx="10" cy="7" r="3" stroke="currentColor" stroke-width="1.4"/>
                <path d="M3.5 17c0-3.59 2.91-6.5 6.5-6.5s6.5 2.91 6.5 6.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                <path d="M13.5 4l1 1.5L16 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              </svg>
            </span>
            <span class="sm-menu-text">Private Service</span>
          </div>
        </div>
      </div>

      <div class="sm-home-indicator">
        <div class="sm-home-indicator-bar"></div>
      </div>
    </div>
  </div>

  <!-- btn-menu hotspot: left:23 top:104 size:64×64 (matches Figma node 1911:7950) -->
  <button class="hotspot" id="btn-menu"
    style="left:10px; top: 65px; width:48px; height:48px;"
    onclick="showSideMenu()">
  </button>

  <!-- Dim-area hotspot on side menu (right portion) to close -->
  <button class="hotspot" id="btn-close"
    style="left:338px; top:0; width:55px; height:852px; display:none;"
    onclick="showMap()">
  </button>

</div>

<script>
  /* ── Read wallet state from localStorage ─────────────────────────────── */
  function getWalletState() {
    try {
      return JSON.parse(localStorage.getItem('muvmi_wallet')) || null;
    } catch { return null; }
  }

  function parseExpiry(str) {
    // "d/m/yyyy"
    const [d, m, y] = str.split('/').map(Number);
    return new Date(y, m - 1, d);
  }

  function expiryColor(dateStr) {
    const exp = parseExpiry(dateStr);
    const now = new Date();
    const daysLeft = Math.ceil((exp - now) / 86400000);
    if (daysLeft <= 30)  return 'red';
    if (daysLeft <= 60)  return 'orange';
    return 'gray';
  }

  function formatExpiryDate(str) {
    // "31/4/2026" → "31 Apr 2026"
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const [d, m, y] = str.split('/').map(Number);
    return `${d} ${months[m - 1]} ${y}`;
  }

  function renderSideMenuWallet() {
    const wallet = getWalletState();
    const balanceEl  = document.getElementById('sm-balance');
    const expiryEl   = document.getElementById('sm-expiry-text');

    if (!wallet) {
      balanceEl.textContent = '— ฿';
      expiryEl.innerHTML = '';
      return;
    }

    // ① Balance — same as payment method screen
    balanceEl.textContent = wallet.walletBalance + ' ฿';

    // ② Earliest expiry voucher (sort by expiry date ascending)
    const sorted = [...wallet.vouchers]
      .filter(v => v.expiry)
      .sort((a, b) => parseExpiry(a.expiry) - parseExpiry(b.expiry));

    if (sorted.length === 0) {
      expiryEl.innerHTML = '';
      return;
    }

    const earliest = sorted[0];
    const color    = expiryColor(earliest.expiry);
    const dateStr  = formatExpiryDate(earliest.expiry);

    expiryEl.innerHTML =
      `${earliest.amount} ฿ expires ` +
      `<span class="sm-expiry-date ${color}">${dateStr}</span>`;
  }

  /* ── Show / hide side menu ───────────────────────────────────────────── */
  function showSideMenu() {
    renderSideMenuWallet();
    document.getElementById('img-map').classList.remove('active');
    document.getElementById('side-menu').classList.add('active');
    document.getElementById('btn-menu').style.display = 'none';
    document.getElementById('btn-close').style.display = 'block';
  }

  function showMap() {
    document.getElementById('side-menu').classList.remove('active');
    document.getElementById('img-map').classList.add('active');
    document.getElementById('btn-close').style.display = 'none';
    document.getElementById('btn-menu').style.display = 'block';
  }

  /* ── Auto-sync balance when wallet-app.html changes data ────────────── */

  // Cross-tab sync: fires when localStorage changes in another tab
  window.addEventListener('storage', (e) => {
    if (e.key === 'muvmi_wallet') renderSideMenuWallet();
  });

  // Same-tab sync: user returns from wallet-app.html via browser back
  window.addEventListener('pageshow', renderSideMenuWallet);
  window.addEventListener('focus',    renderSideMenuWallet);
</script>
</body>
</html>
